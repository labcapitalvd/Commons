[project]
name = "shared_models"
version = "0.1.0"
description = "package para configurar el shared_models."
requires-python = ">=3.14"
dependencies = [
    "sqlalchemy>=2.0.44",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_models"]
