[project]
name = "shared_db"
version = "0.1.0"
description = "package para configurar la db."
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.30.0",
    "psycopg>=3.2.12",
    "sqlalchemy>=2.0.44",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_db"]
