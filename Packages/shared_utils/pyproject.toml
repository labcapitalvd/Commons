[project]
name = "shared_utils"
version = "0.1.0"
description = "Pyproject para utils varios."
requires-python = ">=3.12"
dependencies = [
    "argon2-cffi>=25.1.0",
    "cryptography>=46.0.3",
    "fastapi>=0.120.2",
    "joserfc>=1.4.0",
    "passlib>=1.7.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_utils"]
